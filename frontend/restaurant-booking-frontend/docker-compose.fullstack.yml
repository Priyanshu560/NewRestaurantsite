version: "3.9"

# ── Full-stack docker-compose (backend + frontend + MySQL + Redis) ──

services:

  mysql:
    image: mysql:8.0
    container_name: restaurant_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      restaurant_db
      MYSQL_USER:          ${DB_USER:-restaurant_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-restaurant_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./restaurant-booking-backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [restaurant_net]

  redis:
    image: redis:7-alpine
    container_name: restaurant_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    networks: [restaurant_net]

  backend:
    build:
      context: ./restaurant-booking-backend
      dockerfile: Dockerfile
    container_name: restaurant_backend
    restart: unless-stopped
    environment:
      DB_HOST:        mysql
      DB_PORT:        3306
      DB_NAME:        restaurant_db
      DB_USER:        ${DB_USER:-restaurant_user}
      DB_PASSWORD:    ${DB_PASSWORD:-restaurant_pass}
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      JWT_SECRET:     ${JWT_SECRET:-c2VjcmV0S2V5Rm9yUmVzdGF1cmFudEJvb2tpbmdTeXN0ZW0yMDI0U3VwZXJTZWN1cmVLZXk=}
      MAIL_USERNAME:  ${MAIL_USERNAME:-noreply@example.com}
      MAIL_PASSWORD:  ${MAIL_PASSWORD:-}
      FRONTEND_URL:   http://localhost:3000
      CORS_ORIGINS:   http://localhost:3000,http://localhost:80
    depends_on:
      mysql:  { condition: service_healthy }
      redis:  { condition: service_healthy }
    networks: [restaurant_net]

  frontend:
    build:
      context: ./restaurant-booking-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""   # uses nginx proxy (/api → backend:8080)
    container_name: restaurant_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on: [backend]
    networks: [restaurant_net]

volumes:
  mysql_data:
  redis_data:

networks:
  restaurant_net:
    driver: bridge
